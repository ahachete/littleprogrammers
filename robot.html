<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Am a Robot!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Bubblegum Sans', 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #d4fc79 100%);
    min-height: 100vh;
    overflow: hidden;
  }

  h1 {
    text-align: center;
    font-size: 2.2rem;
    color: #fff;
    text-shadow: 3px 3px 0 #e84393, -1px -1px 0 #6c5ce7;
    padding: 10px 0 6px;
    background: linear-gradient(90deg, #6c5ce7, #e84393, #fd79a8, #fdcb6e, #00b894);
    letter-spacing: 2px;
  }

  .container {
    display: flex;
    height: calc(100vh - 56px);
    gap: 0;
  }

  /* LEFT PANEL */
  .left-panel {
    width: 38%;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.85);
    border-right: 4px solid #dfe6e9;
  }

  .palette-title {
    text-align: center;
    font-size: 1.1rem;
    color: #636e72;
    padding: 8px 0 4px;
  }

  .palette {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 3px dashed #b2bec3;
  }

  .palette-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 72px;
    height: 72px;
    border: 3px solid rgba(0,0,0,0.1);
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: bold;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    user-select: none;
  }
  .palette-btn:hover { transform: scale(1.12); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .palette-btn:active { transform: scale(0.95); }
  .palette-btn .icon { font-size: 1.7rem; line-height: 1; }

  .palette-btn.forward  { background: linear-gradient(135deg, #00b894, #55efc4); }
  .palette-btn.backward { background: linear-gradient(135deg, #d63031, #ff7675); }
  .palette-btn.left     { background: linear-gradient(135deg, #0984e3, #74b9ff); }
  .palette-btn.right    { background: linear-gradient(135deg, #e17055, #fab1a0); }
  .palette-btn.run      { background: linear-gradient(135deg, #00b300, #7bed9f); }
  .palette-btn.sing     { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
  .palette-btn.clap     { background: linear-gradient(135deg, #fdcb6e, #ffeaa7); color: #6d4c00; text-shadow: none; }
  .palette-btn.jump     { background: linear-gradient(135deg, #e84393, #fd79a8); }

  .program-title {
    text-align: center;
    font-size: 1.1rem;
    color: #636e72;
    padding: 8px 0 4px;
  }

  .program-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 12px;
    min-height: 0;
  }

  .program-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    margin-bottom: 6px;
    border-radius: 12px;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.3s;
    position: relative;
  }
  .program-item.highlight {
    transform: scale(1.05);
    box-shadow: 0 0 20px 4px rgba(108, 92, 231, 0.6);
    z-index: 1;
  }

  .program-item .line-num {
    font-size: 1.3rem;
    font-weight: bold;
    color: #b2bec3;
    min-width: 28px;
    text-align: right;
  }

  .program-item .instr-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    color: #fff;
    flex-shrink: 0;
  }

  .program-item .instr-label {
    flex: 1;
    font-size: 1.1rem;
    color: #2d3436;
  }

  .program-item .remove-btn {
    background: none;
    border: none;
    font-size: 1.3rem;
    color: #b2bec3;
    cursor: pointer;
    padding: 0 4px;
    transition: color 0.2s;
    font-family: inherit;
  }
  .program-item .remove-btn:hover { color: #d63031; }

  .controls {
    display: flex;
    gap: 12px;
    padding: 12px;
    justify-content: center;
    border-top: 3px dashed #b2bec3;
  }

  .ctrl-btn {
    font-family: inherit;
    font-size: 1.3rem;
    padding: 12px 32px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }
  .ctrl-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .ctrl-btn:active { transform: scale(0.95); }

  .play-btn {
    background: linear-gradient(135deg, #00b894, #55efc4);
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  }
  .play-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }
  .clear-btn {
    background: linear-gradient(135deg, #636e72, #b2bec3);
    color: #fff;
  }

  /* RIGHT PANEL */
  .right-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  canvas {
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }

  /* Empty state */
  .empty-msg {
    text-align: center;
    color: #b2bec3;
    font-size: 1.1rem;
    padding: 30px 20px;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confetti-fall 2.5s ease-out forwards;
  }
  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
</style>
</head>
<body>

<h1>&#129302; I Am a Robot! &#129302;</h1>

<div class="container">
  <div class="left-panel">
    <div class="palette-title">Pick an order:</div>
    <div class="palette">
      <button class="palette-btn forward"  onclick="addInstruction('forward')"><span class="icon">⬆️</span>Forward</button>
      <button class="palette-btn backward" onclick="addInstruction('backward')"><span class="icon">⬇️</span>Backward</button>
      <button class="palette-btn left"     onclick="addInstruction('left')"><span class="icon">↩️</span>Turn L</button>
      <button class="palette-btn right"    onclick="addInstruction('right')"><span class="icon">↪️</span>Turn R</button>
      <button class="palette-btn run"      onclick="addInstruction('run')"><span class="icon">⏩</span>Run!</button>
      <button class="palette-btn sing"     onclick="addInstruction('sing')"><span class="icon">🎵</span>Sing!</button>
      <button class="palette-btn clap"     onclick="addInstruction('clap')"><span class="icon">👏</span>Clap!</button>
      <button class="palette-btn jump"     onclick="addInstruction('jump')"><span class="icon">🦘</span>Jump!</button>
    </div>
    <div class="program-title">The Program:</div>
    <div class="program-list" id="programList">
      <div class="empty-msg">No orders yet!<br>Click the buttons above &#x1F446;</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn play-btn" id="playBtn" onclick="runProgram()">&#9654; PLAY</button>
      <button class="ctrl-btn clear-btn" id="clearBtn" onclick="clearProgram()">&#128465; CLEAR</button>
    </div>
  </div>
  <div class="right-panel">
    <canvas id="robotCanvas"></canvas>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const STEP = 50;          // pixels per "move forward"
const GRID = STEP;
const ANIM_MS = 800;      // ms for one instruction animation
const PAUSE_MS = 500;     // pause between instructions

const INSTR_META = {
  forward:  { icon: '⬆️',  label: 'Forward',  bg: 'linear-gradient(135deg,#00b894,#55efc4)' },
  backward: { icon: '⬇️',  label: 'Backward', bg: 'linear-gradient(135deg,#d63031,#ff7675)' },
  left:     { icon: '↩️',  label: 'Turn Left', bg: 'linear-gradient(135deg,#0984e3,#74b9ff)' },
  right:    { icon: '↪️',  label: 'Turn Right',bg: 'linear-gradient(135deg,#e17055,#fab1a0)' },
  run:      { icon: '⏩',  label: 'Run!',      bg: 'linear-gradient(135deg,#00b300,#7bed9f)' },
  sing:     { icon: '🎵',  label: 'Sing!',     bg: 'linear-gradient(135deg,#6c5ce7,#a29bfe)' },
  clap:     { icon: '👏',  label: 'Clap!',     bg: 'linear-gradient(135deg,#fdcb6e,#ffeaa7)' },
  jump:     { icon: '🦘',  label: 'Jump!',     bg: 'linear-gradient(135deg,#e84393,#fd79a8)' },
};

let program = [];       // array of instruction keys
let running = false;

// Robot state
let robot = { x: 0, y: 0, angle: 0 };  // angle: 0=up, 90=right, 180=down, 270=left
let trail = [];  // [{x1,y1,x2,y2,color}]
let trailColorIdx = 0;
const TRAIL_COLORS = ['#e84393','#6c5ce7','#0984e3','#00b894','#fdcb6e','#e17055','#d63031','#00cec9'];

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('robotCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const panel = document.querySelector('.right-panel');
  const w = panel.clientWidth - 32;
  const h = panel.clientHeight - 32;
  const size = Math.min(w, h, 600);
  canvas.width = size;
  canvas.height = size;
  resetRobot();
  drawScene();
}

function resetRobot() {
  robot.x = canvas.width / 2;
  robot.y = canvas.height / 2;
  robot.angle = 0;
  trail = [];
  trailColorIdx = 0;
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50);

// ============================================================
// DRAWING
// ============================================================
function drawScene() {
  const W = canvas.width, H = canvas.height;
  // Background
  ctx.fillStyle = '#f8f9fa';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#dfe6e9';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Trail
  for (const t of trail) {
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y1);
    ctx.lineTo(t.x2, t.y2);
    ctx.stroke();
  }

  // Robot
  drawRobot(robot.x, robot.y, robot.angle);
}

function drawRobot(x, y, angle, scale = 1, jumpOffset = 0) {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#f8f9fa';
  // Redraw background + grid + trail for animation frames
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#dfe6e9';
  ctx.lineWidth = 1;
  for (let gx = 0; gx <= W; gx += GRID) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = 0; gy <= H; gy += GRID) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }
  for (const t of trail) {
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y1);
    ctx.lineTo(t.x2, t.y2);
    ctx.stroke();
  }

  ctx.save();
  ctx.translate(x, y - jumpOffset);
  ctx.rotate((angle * Math.PI) / 180);
  ctx.scale(scale, scale);

  const r = 20;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.ellipse(0, r + 4, r, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (circle)
  ctx.fillStyle = '#636e72';
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#2d3436';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Antenna
  ctx.strokeStyle = '#b2bec3';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(0, -r - 12);
  ctx.stroke();
  ctx.fillStyle = '#e84393';
  ctx.beginPath();
  ctx.arc(0, -r - 14, 4, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (in the direction the robot faces = "up" in local coords)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-7, -6, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, -6, 6, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.arc(-7, -8, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, -8, 3, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#2d3436';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 4, 7, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();

  ctx.restore();
}

// ============================================================
// PROGRAM LIST UI
// ============================================================
function renderProgram() {
  const list = document.getElementById('programList');
  if (program.length === 0) {
    list.innerHTML = '<div class="empty-msg">No orders yet!<br>Click the buttons above &#x1F446;</div>';
    return;
  }
  list.innerHTML = '';
  program.forEach((key, i) => {
    const meta = INSTR_META[key];
    const item = document.createElement('div');
    item.className = 'program-item';
    item.dataset.index = i;
    item.innerHTML = `
      <span class="line-num">${i + 1}</span>
      <span class="instr-icon" style="background:${meta.bg}">${meta.icon}</span>
      <span class="instr-label">${meta.label}</span>
      <button class="remove-btn" onclick="removeInstruction(${i})" title="Remove">&times;</button>
    `;
    list.appendChild(item);
  });
  // Scroll to bottom
  list.scrollTop = list.scrollHeight;
}

function addInstruction(key) {
  if (running) return;
  program.push(key);
  renderProgram();
  playBoop();
}

function removeInstruction(index) {
  if (running) return;
  program.splice(index, 1);
  renderProgram();
}

function clearProgram() {
  if (running) return;
  program = [];
  renderProgram();
  resetRobot();
  drawScene();
}

// ============================================================
// EXECUTION
// ============================================================
async function runProgram() {
  if (running || program.length === 0) return;
  running = true;
  document.getElementById('playBtn').disabled = true;

  // Reset robot position
  resetRobot();
  drawScene();
  await sleep(300);

  for (let i = 0; i < program.length; i++) {
    // Highlight current instruction
    highlightInstruction(i);
    await sleep(200);

    const key = program[i];
    await executeInstruction(key);

    unhighlightAll();
    // Pause between instructions
    if (i < program.length - 1) await sleep(PAUSE_MS);
  }

  // Celebration!
  launchConfetti();

  running = false;
  document.getElementById('playBtn').disabled = false;
}

function highlightInstruction(index) {
  const items = document.querySelectorAll('.program-item');
  items.forEach((el, i) => {
    el.classList.toggle('highlight', i === index);
    if (i === index) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

function unhighlightAll() {
  document.querySelectorAll('.program-item').forEach(el => el.classList.remove('highlight'));
}

async function executeInstruction(key) {
  switch (key) {
    case 'forward':  await animateMove(1); break;
    case 'backward': await animateMove(-1); break;
    case 'run':      await animateMove(4); break;
    case 'left':     await animateRotate(-90); break;
    case 'right':    await animateRotate(90); break;
    case 'sing':     await animateSing(); break;
    case 'clap':     await animateClap(); break;
    case 'jump':     await animateJump(); break;
  }
}

// ============================================================
// ANIMATIONS
// ============================================================
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function directionVector(angle) {
  const rad = ((angle - 90) * Math.PI) / 180; // -90 because 0=up
  return { dx: Math.cos(rad), dy: Math.sin(rad) };
}

async function animateMove(steps) {
  const { dx, dy } = directionVector(robot.angle);
  const totalDist = steps * STEP;
  const x1 = robot.x, y1 = robot.y;
  const x2 = x1 + dx * totalDist;
  const y2 = y1 + dy * totalDist;
  const duration = ANIM_MS * (Math.abs(steps) > 1 ? 1.5 : 1);
  const startTime = performance.now();

  // Pick trail color
  const color = TRAIL_COLORS[trailColorIdx % TRAIL_COLORS.length];
  trailColorIdx++;

  return new Promise(resolve => {
    function frame(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // ease in-out
      const cx = x1 + (x2 - x1) * ease;
      const cy = y1 + (y2 - y1) * ease;

      // Update partial trail
      const partialTrail = { x1, y1, x2: cx, y2: cy, color };
      const allTrails = [...trail, partialTrail];
      const savedTrail = trail;
      trail = allTrails;
      drawRobot(cx, cy, robot.angle);
      trail = savedTrail;

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        robot.x = x2;
        robot.y = y2;
        trail.push({ x1, y1, x2, y2, color });
        drawScene();
        playBoop();
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

async function animateRotate(degrees) {
  const startAngle = robot.angle;
  const endAngle = startAngle + degrees;
  const startTime = performance.now();

  return new Promise(resolve => {
    function frame(now) {
      const t = Math.min((now - startTime) / ANIM_MS, 1);
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      const a = startAngle + (endAngle - startAngle) * ease;
      drawRobot(robot.x, robot.y, a);

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        robot.angle = ((endAngle % 360) + 360) % 360;
        drawScene();
        playBoop();
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

async function animateSing() {
  playSingMelody();
  // Wiggle animation
  const startTime = performance.now();
  const dur = 1200;
  return new Promise(resolve => {
    function frame(now) {
      const t = Math.min((now - startTime) / dur, 1);
      const wiggle = Math.sin(t * Math.PI * 8) * 8;
      drawRobot(robot.x + wiggle, robot.y, robot.angle, 1 + Math.sin(t * Math.PI * 4) * 0.08);
      // Draw music notes floating up
      const nctx = ctx;
      nctx.font = '24px serif';
      nctx.fillStyle = `rgba(108,92,231,${1 - t})`;
      nctx.fillText('♪', robot.x - 25, robot.y - 30 - t * 40);
      nctx.fillText('♫', robot.x + 15, robot.y - 20 - t * 50);
      nctx.fillText('♪', robot.x - 5, robot.y - 40 - t * 30);

      if (t < 1) requestAnimationFrame(frame);
      else { drawScene(); resolve(); }
    }
    requestAnimationFrame(frame);
  });
}

async function animateClap() {
  playClapSound();
  const startTime = performance.now();
  const dur = 800;
  return new Promise(resolve => {
    function frame(now) {
      const t = Math.min((now - startTime) / dur, 1);
      const squeeze = 1 + Math.sin(t * Math.PI * 6) * 0.15;
      drawRobot(robot.x, robot.y, robot.angle, squeeze);
      // Draw clap stars
      if (t < 0.7) {
        const nctx = ctx;
        nctx.font = `${20 + t * 20}px serif`;
        nctx.fillStyle = `rgba(253,203,110,${1 - t})`;
        nctx.fillText('✨', robot.x - 30 - t * 15, robot.y - 15);
        nctx.fillText('✨', robot.x + 20 + t * 15, robot.y - 15);
        nctx.fillText('👏', robot.x - 10, robot.y - 30 - t * 20);
      }
      if (t < 1) requestAnimationFrame(frame);
      else { drawScene(); resolve(); }
    }
    requestAnimationFrame(frame);
  });
}

async function animateJump() {
  playBoop(600);
  const startTime = performance.now();
  const dur = 700;
  return new Promise(resolve => {
    function frame(now) {
      const t = Math.min((now - startTime) / dur, 1);
      const jumpH = Math.sin(t * Math.PI) * 35;
      const squash = t > 0.85 ? 1 + (1 - t) / 0.15 * 0.1 : 1;
      drawRobot(robot.x, robot.y, robot.angle, squash, jumpH);

      if (t < 1) requestAnimationFrame(frame);
      else { drawScene(); resolve(); }
    }
    requestAnimationFrame(frame);
  });
}

// ============================================================
// SOUNDS (Web Audio API)
// ============================================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBoop(freq = 440) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function playSingMelody() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 587, 659, 698, 784, 698, 659, 587]; // C5 D5 E5 F5 G5 F5 E5 D5
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.15);
    });
  } catch(e) {}
}

function playClapSound() {
  try {
    const ctx = getAudioCtx();
    // White noise burst for clap
    for (let c = 0; c < 2; c++) {
      const bufferSize = ctx.sampleRate * 0.05;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const gain = ctx.createGain();
      const t = ctx.currentTime + c * 0.2;
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      source.connect(gain);
      gain.connect(ctx.destination);
      source.start(t);
    }
  } catch(e) {}
}

// ============================================================
// CONFETTI
// ============================================================
function launchConfetti() {
  const colors = ['#e84393','#6c5ce7','#0984e3','#00b894','#fdcb6e','#e17055','#d63031','#00cec9','#fd79a8','#a29bfe'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

renderProgram();
