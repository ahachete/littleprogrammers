    justify-content: center;

    transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s;
    font-family: inherit;

    <div class="spacer"></div>

        <button class="char-btn" id="charBluey" onclick="selectChar('bluey')">

</div>

<script>
// ============================================================
// STATE
// ============================================================
let selectedChar = 'r2d2';
let animating = false;
let animFrameId = null;

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('countCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const panel = document.querySelector('.right-panel');
  const w = panel.clientWidth * 0.85;
  const h = panel.clientHeight * 0.85;
  canvas.width = w;
  canvas.height = h;
  clearCanvas();
}

function clearCanvas() {
  ctx.fillStyle = '#f8f9fa';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawCounter(current, total, done) {
  // Clear counter area
  ctx.fillStyle = '#f8f9fa';
  ctx.fillRect(0, 0, canvas.width, 36);
  // Draw text centered at top
  ctx.font = "bold 24px 'Bubblegum Sans', cursive";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = done ? '#e84393' : '#6c5ce7';
  const text = done ? current.toString() : current.toString();
  ctx.fillText(text, canvas.width / 2, 20);
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50);

// ============================================================
// CHARACTER DRAWING FUNCTIONS (nominal 32px design space)
// ============================================================

// ============================================================
// GRID LAYOUT CALCULATION
// Constant real-estate: icons + gaps fill ~80% of canvas area.
// Fewer icons = bigger icons; more icons = smaller icons.
// ============================================================
function calcGrid(n, canvasW, canvasH) {
  const padding = 16;
  const availW = canvasW - padding * 2;
  const availH = canvasH - padding * 2;
  const gapRatio = 0.35;  // gap = 35% of icon size

  // For small N, icons should fill the width; for large N, pack tightly.
  // Strategy: compute ideal icon size so that a single row of N spans availW,
  // then allow wrapping if icons would be too small.
  // First, try fitting all in one row:
  let iconSize = availW / (n * (1 + gapRatio));

  // If that makes icons too large vertically (more than ~40% of canvas height),
  // or if N is large enough to benefit from multiple rows, use area-based calc.
  const maxIconFromHeight = availH * 0.4;
  if (iconSize > maxIconFromHeight || n > 20) {
    // Area-based: fill ~85% of canvas
    const fillRatio = 0.85;
    const targetArea = fillRatio * availW * availH;
    let cellSize = Math.sqrt(targetArea / n);
    iconSize = cellSize / (1 + gapRatio);
  }

  // Clamp: min 14, no hard max (let small counts be big)
  iconSize = Math.max(14, iconSize);
  const gap = Math.max(3, iconSize * gapRatio);
  let cellSize = iconSize + gap;

  // How many cols fit?
  const cols = Math.max(1, Math.floor(availW / cellSize));
  const rows = Math.ceil(n / cols);

  // If rows overflow vertically, shrink to fit
  if (rows * cellSize > availH) {
    const fitCellH = availH / rows;
    const fitIcon = fitCellH / (1 + gapRatio);
    iconSize = Math.max(14, fitIcon);
    cellSize = iconSize + Math.max(3, iconSize * gapRatio);
  }

  const actualCols = Math.max(1, Math.floor(availW / cellSize));
  const actualRows = Math.ceil(n / actualCols);

  // Center the grid
  const gridW = actualCols * cellSize;
  const gridH = actualRows * cellSize;
  const offsetX = padding + (availW - gridW) / 2 + cellSize / 2;
  const offsetY = padding + (availH - gridH) / 2 + cellSize / 2;

  return { iconSize, cols: actualCols, cellSize, offsetX, offsetY };
}

function getItemPos(index, grid) {
  const col = index % grid.cols;
  const row = Math.floor(index / grid.cols);
  return {
    x: grid.offsetX + col * grid.cellSize,
    y: grid.offsetY + row * grid.cellSize
  };
}

// ============================================================
// ANIMATION
// ============================================================
function startDraw() {
  if (animating) return;

  const input = document.getElementById('numberInput');
  let n = parseInt(input.value, 10);
  if (isNaN(n) || n < 1) n = 1;
  if (n > 1000) n = 1000;
  input.value = n;

  animating = true;
  document.getElementById('drawBtn').disabled = true;

  clearCanvas();

  const counterH = 38; // reserved height for counter at top
  const grid = calcGrid(n, canvas.width, canvas.height - counterH);
  // Shift grid down to leave room for counter
  grid.offsetY += counterH;
  const drawFn = DRAW_FNS[selectedChar];

  // Scale duration: small N is quick, large N gets the full 6s.
  // e.g. 2 items ~0.8s, 5 items ~1.5s, 20 items ~3s, 100+ items ~6s.
  const totalDuration = Math.min(6000, 400 * Math.pow(n, 0.55));

  // Each item gets a time slot. Spacing between consecutive items is even,
  // but we compress the second half so it accelerates.
  // time(i) = totalDuration * ((i+1)/n)^0.3  — first items get most time.
  const itemTimes = [];
  for (let i = 0; i < n; i++) {
    const t = Math.pow((i + 1) / n, 0.3);
    itemTimes.push(totalDuration * t);
  }

  let drawnCount = 0;
  const startTime = performance.now();

  // Play initial boop
  playBoop();

  function frame(now) {
    const elapsed = now - startTime;

    // Determine how many items should be drawn by now
    let targetCount = drawnCount;
    while (targetCount < n && itemTimes[targetCount] <= elapsed) {
      targetCount++;
    }

    // Draw all newly-due items
    if (targetCount > drawnCount) {
      for (let i = drawnCount; i < targetCount; i++) {
        const pos = getItemPos(i, grid);
        drawFn(ctx, pos.x, pos.y, grid.iconSize);
      }
      drawnCount = targetCount;
      drawCounter(drawnCount, n, false);
    }

    if (drawnCount < n) {
      animFrameId = requestAnimationFrame(frame);
    } else {
      drawCounter(n, n, true);
      animating = false;
      document.getElementById('drawBtn').disabled = false;
      playCelebration();
      launchConfetti();
    }
  }

  // Draw the first item immediately (no wait)
  const pos0 = getItemPos(0, grid);
  drawFn(ctx, pos0.x, pos0.y, grid.iconSize);
  drawnCount = 1;
  drawCounter(1, n, false);
  if (n === 1) {
    drawCounter(1, 1, true);
    animating = false;
    document.getElementById('drawBtn').disabled = false;
    playCelebration();
    launchConfetti();
  } else {
    animFrameId = requestAnimationFrame(frame);
  }
}

// ============================================================
// SOUNDS (Web Audio API)
// ============================================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBoop(freq = 440) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function playCelebration() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.25);
    });
  } catch(e) {}
}

// ============================================================
// CONFETTI
// ============================================================
function launchConfetti() {
  const colors = ['#e84393','#6c5ce7','#0984e3','#00b894','#fdcb6e','#e17055','#d63031','#00cec9','#fd79a8','#a29bfe'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.width = (8 + Math.random() * 10) + 'px';
    piece.style.height = (8 + Math.random() * 10) + 'px';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}
