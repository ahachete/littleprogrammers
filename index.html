<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Programmers!</title>
<link rel="stylesheet" href="common.css">
<style>
  body {
    display: flex;
    flex-direction: column;
  }

  .menu {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 30px 40px;
  }

  .game-btn {
    flex: 1;
    max-width: 540px;
    height: calc(100vh - 160px);
    background: rgba(255,255,255,0.92);
    border: 6px solid rgba(0,0,0,0.08);
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    text-decoration: none;
    color: inherit;
    padding: 30px 20px;
    position: relative;
    overflow: hidden;
  }

  .game-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    border-color: #6c5ce7;
  }

  .game-btn:active {
    transform: scale(0.98);
  }

  .game-btn canvas {
    border-radius: 18px;
    flex-shrink: 0;
  }

  .game-btn .btn-title {
    font-size: 2.4rem;
    color: #2d3436;
    text-align: center;
    line-height: 1.2;
  }

  .game-btn .btn-subtitle {
    font-size: 1.3rem;
    color: #636e72;
    text-align: center;
  }

  .game-btn.counting { border-bottom: 8px solid #e84393; }
  .game-btn.robot { border-bottom: 8px solid #6c5ce7; }

  .game-btn.counting:hover { border-color: #e84393; }
  .game-btn.robot:hover { border-color: #6c5ce7; }

  .game-btn .btn-title .emoji {
    font-size: 2.2rem;
  }
</style>
</head>
<body>

<h1>&#128187; Little Programmers! &#128187;</h1>

<div class="menu">
  <a href="count.html" class="game-btn counting">
    <canvas id="countPreview" width="360" height="320"></canvas>
    <div class="btn-title"><span class="emoji">&#129518;</span> How Fast Can<br>a Computer Count?</div>
    <div class="btn-subtitle">Pick a character and watch them multiply!</div>
  </a>

  <a href="robot.html" class="game-btn robot">
    <canvas id="robotPreview" width="360" height="320"></canvas>
    <div class="btn-title"><span class="emoji">&#129302;</span> Program<br>the Robot!</div>
    <div class="btn-subtitle">Give orders and watch the robot move!</div>
  </a>
</div>

<script>
// ============================================================
// COUNTING PREVIEW — grid of mini characters
// ============================================================
(function() {
  const c = document.getElementById('countPreview');
  const ctx = c.getContext('2d');

  // Light background
  ctx.fillStyle = '#f8f9fa';
  ctx.beginPath();
  ctx.roundRect(0, 0, c.width, c.height, 14);
  ctx.fill();

  // Draw a grid of mixed mini characters
  const chars = [drawMiniR2D2, drawMiniBluey, drawMiniMarshall];
  const size = 28;
  const gap = 8;
  const cell = size + gap;
  const cols = Math.floor((c.width - 20) / cell);
  const rows = Math.floor((c.height - 20) / cell);
  const offsetX = (c.width - cols * cell + gap) / 2 + size / 2;
  const offsetY = (c.height - rows * cell + gap) / 2 + size / 2;

  let idx = 0;
  for (let r = 0; r < rows; r++) {
    for (let col = 0; col < cols; col++) {
      const fn = chars[idx % chars.length];
      fn(ctx, offsetX + col * cell, offsetY + r * cell, size);
      idx++;
    }
  }

  // Counter overlay at top
  ctx.font = "bold 22px 'Bubblegum Sans', cursive";
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e84393';
  ctx.fillText(cols * rows, c.width / 2, 22);

  function drawMiniR2D2(ctx, cx, cy, sz) {
    const s = sz / 32;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(s, s);
    // Legs
    ctx.fillStyle = '#636e72';
    ctx.fillRect(-12, 12, 6, 4);
    ctx.fillRect(6, 12, 6, 4);
    // Body
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(-9, -5, 18, 16, 3);
    ctx.fill();
    ctx.strokeStyle = '#b2bec3';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Blue bands
    ctx.fillStyle = '#0984e3';
    ctx.fillRect(-7, 0, 14, 2.5);
    ctx.fillRect(-7, 5, 14, 1.5);
    // Dome
    ctx.fillStyle = '#74b9ff';
    ctx.beginPath();
    ctx.arc(0, -5, 9, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -5, 6, Math.PI, -0.2);
    ctx.fill();
    // Eye
    ctx.fillStyle = '#d63031';
    ctx.beginPath();
    ctx.arc(0, -9, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawMiniBluey(ctx, cx, cy, sz) {
    const s = sz / 32;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(s, s);
    // Body
    ctx.fillStyle = '#5dade2';
    ctx.beginPath();
    ctx.ellipse(0, 8, 8, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#2e86c1';
    ctx.beginPath();
    ctx.arc(0, -4, 9, 0, Math.PI * 2);
    ctx.fill();
    // Ears
    ctx.fillStyle = '#1a5276';
    ctx.beginPath();
    ctx.ellipse(-6, -12, 3, 5, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(6, -12, 3, 5, 0.2, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-3.5, -5.5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3.5, -5.5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.arc(-3.5, -5.5, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3.5, -5.5, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.ellipse(0, -2, 2, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawMiniMarshall(ctx, cx, cy, sz) {
    const s = sz / 32;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(s, s);
    // Body
    ctx.fillStyle = '#d63031';
    ctx.beginPath();
    ctx.ellipse(0, 8, 8, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    // Ears
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.ellipse(-9, -2, 4, 6, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(9, -2, 4, 6, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -4, 9, 0, Math.PI * 2);
    ctx.fill();
    // Spots
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.ellipse(-5, -8, 2, 1.5, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(4, -9, 1.5, 1.2, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Helmet
    ctx.fillStyle = '#d63031';
    ctx.beginPath();
    ctx.ellipse(0, -11, 10, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(-6, -17, 12, 7, 3);
    ctx.fill();
    ctx.fillStyle = '#fdcb6e';
    ctx.beginPath();
    ctx.roundRect(-3, -15, 6, 4, 1.5);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-3.5, -5.5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3.5, -5.5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6d4c00';
    ctx.beginPath();
    ctx.arc(-3.5, -5.5, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3.5, -5.5, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.ellipse(0, -2, 2, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
})();

// ============================================================
// ROBOT PREVIEW — the robot from robot.html on a grid
// ============================================================
(function() {
  const c = document.getElementById('robotPreview');
  const ctx = c.getContext('2d');

  // Light background with grid
  ctx.fillStyle = '#f8f9fa';
  ctx.beginPath();
  ctx.roundRect(0, 0, c.width, c.height, 14);
  ctx.fill();

  // Grid lines
  const GRID = 40;
  ctx.strokeStyle = '#dfe6e9';
  ctx.lineWidth = 1;
  for (let x = 0; x <= c.width; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, c.height); ctx.stroke();
  }
  for (let y = 0; y <= c.height; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(c.width, y); ctx.stroke();
  }

  // Colored trail
  const trails = [
    { x1: 180, y1: 260, x2: 180, y2: 180, color: '#e84393' },
    { x1: 180, y1: 180, x2: 260, y2: 180, color: '#6c5ce7' },
    { x1: 260, y1: 180, x2: 260, y2: 100, color: '#0984e3' },
    { x1: 260, y1: 100, x2: 180, y2: 100, color: '#00b894' },
  ];
  for (const t of trails) {
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y1);
    ctx.lineTo(t.x2, t.y2);
    ctx.stroke();
  }

  // Robot at end of trail
  drawRobot(ctx, 180, 100, 0);

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawRobot(ctx, x, y, angle) {
    const R = 22;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate((angle * Math.PI) / 180);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    ctx.beginPath();
    ctx.ellipse(0, R + 5, R * 0.8, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    const bw = R * 1.5, bh = R * 1.8;

    // Body
    ctx.fillStyle = '#636e72';
    roundRect(ctx, -bw/2, -bh/2 + 2, bw, bh, 8);
    ctx.fill();
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 2;
    roundRect(ctx, -bw/2, -bh/2 + 2, bw, bh, 8);
    ctx.stroke();

    // Chest
    ctx.fillStyle = '#74b9ff';
    roundRect(ctx, -bw/2 + 5, -bh/2 + 12, bw - 10, bh * 0.35, 5);
    ctx.fill();

    // Buttons
    const btnY = -bh/2 + 18;
    ctx.fillStyle = '#e84393';
    ctx.beginPath(); ctx.arc(-6, btnY, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fdcb6e';
    ctx.beginPath(); ctx.arc(0, btnY, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#00b894';
    ctx.beginPath(); ctx.arc(6, btnY, 2.5, 0, Math.PI*2); ctx.fill();

    // Head
    const hw = R * 1.2, hh = R * 1.0;
    const headY = -bh/2 - hh/2 + 4;
    ctx.fillStyle = '#b2bec3';
    roundRect(ctx, -hw/2, headY - hh/2, hw, hh, 7);
    ctx.fill();
    ctx.strokeStyle = '#636e72';
    ctx.lineWidth = 2;
    roundRect(ctx, -hw/2, headY - hh/2, hw, hh, 7);
    ctx.stroke();

    // Visor
    ctx.fillStyle = '#2d3436';
    roundRect(ctx, -hw/2 + 4, headY - hh/2 + 4, hw - 8, hh * 0.55, 4);
    ctx.fill();

    // Eyes
    const eyeY = headY - 2;
    ctx.fillStyle = '#55efc4';
    ctx.shadowColor = '#55efc4';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(-7, eyeY, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, eyeY, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // Pupils
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-7, eyeY - 1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, eyeY - 1, 2, 0, Math.PI * 2); ctx.fill();

    // Antenna
    ctx.strokeStyle = '#636e72';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(0, headY - hh/2);
    ctx.lineTo(0, headY - hh/2 - 11);
    ctx.stroke();
    ctx.fillStyle = '#e84393';
    ctx.shadowColor = '#e84393';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(0, headY - hh/2 - 13, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Arms
    ctx.fillStyle = '#636e72';
    roundRect(ctx, -bw/2 - 7, -bh/2 + 10, 7, bh * 0.35, 3);
    ctx.fill();
    roundRect(ctx, bw/2, -bh/2 + 10, 7, bh * 0.35, 3);
    ctx.fill();

    // Feet
    ctx.fillStyle = '#2d3436';
    roundRect(ctx, -bw/2 + 2, bh/2, 10, 6, 3);
    ctx.fill();
    roundRect(ctx, bw/2 - 12, bh/2, 10, 6, 3);
    ctx.fill();

    ctx.restore();
  }
})();
</script>
</body>
</html>
